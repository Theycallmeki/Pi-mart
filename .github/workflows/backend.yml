name: Backend Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - 'Backend/**'

jobs:
  deploy:
    name: Backend Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          envs: DATABASE_URL,SECRET_KEY
          script: |
            # 1. Navigate to the project folder
            cd /app || { echo "Directory /app not found"; exit 1; }
            
            # 2. Pull the latest code
            git pull origin main || { echo "Git pull failed"; exit 1; }
            
            # 3. Build Backend Docker Image
            docker build -t pi-mart-backend ./Backend
            
            # 4. Stop and remove existing container if running
            docker stop pi-mart-backend || true
            docker rm pi-mart-backend || true
            
            # 5. Run the new container
            docker run -d \
              --name pi-mart-backend \
              -p 5000:5000 \
              --restart always \
              -e DATABASE_URL="$DATABASE_URL" \
              -e SECRET_KEY="$SECRET_KEY" \
              pi-mart-backend
            
            # 6. Cleanup
            docker system prune -f
